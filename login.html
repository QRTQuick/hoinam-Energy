<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Hoinam Energy</title>
    <meta name="description" content="Sign in to manage orders, payments, and installation bookings with Hoinam Energy.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://hoinam-energy.vercel.app/login.html">
    <meta property="og:title" content="Login | Hoinam Energy">
    <meta property="og:description" content="Sign in to manage orders, payments, and installation bookings.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hoinam-energy.vercel.app/login.html">
    <meta property="og:image" content="https://hoinam-energy.vercel.app/assets/og-image.svg">
    <meta name="theme-color" content="#0055B8">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <style>
      /* ── Login page layout ── */
      body[data-page="login"] {
        background: #f5f5f5;
      }

      body[data-page="login"] #site-header,
      body[data-page="login"] #site-footer {
        display: none;
      }

      .login-shell {
        display: grid;
        grid-template-columns: minmax(380px, 480px) 1fr;
        min-height: 100vh;
      }

      /* ── Left panel ── */
      .login-panel {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 2rem;
        padding: 3rem 2.5rem;
        background: #ffffff;
        border-right: 1px solid #ebebeb;
        position: relative;
        z-index: 1;
      }

      .login-brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        text-decoration: none;
      }

      .login-brand img {
        width: 42px;
        height: 42px;
        object-fit: contain;
      }

      .login-brand-name {
        font-family: "Playfair Display", serif;
        font-size: 0.92rem;
        letter-spacing: -0.02em;
        color: #333333;
      }

      .login-heading {
        display: grid;
        gap: 0.35rem;
      }

      .login-heading h1 {
        font-family: "Playfair Display", serif;
        font-size: clamp(1.1rem, 2vw, 1.5rem);
        color: #333333;
        margin: 0;
        line-height: 1.1;
        letter-spacing: -0.03em;
      }

      .login-heading p {
        margin: 0;
        font-size: 0.8rem;
        letter-spacing: -0.01em;
        color: #4d4d4d;
        font-family: "Inter", sans-serif;
      }

      .login-form {
        display: grid;
        gap: 1rem;
      }

      .login-form .field {
        display: grid;
        gap: 0.4rem;
      }

      .login-form label span {
        font-family: "Playfair Display", serif;
        font-size: 0.7rem;
        letter-spacing: -0.01em;
        text-transform: uppercase;
        color: #333333;
      }

      .login-form input {
        border: 1.5px solid #ebebeb;
        border-radius: 14px;
        padding: 0.85rem 1rem;
        font-size: 0.92rem;
        background: #f9f9f9;
        transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
      }

      .login-form input:focus {
        outline: none;
        border-color: #0055b8;
        background: #ffffff;
        box-shadow: 0 0 0 4px rgba(0, 85, 184, 0.1);
      }

      .login-divider {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: #aaa;
        font-size: 0.78rem;
        font-family: "Playfair Display", serif;
        letter-spacing: 0.06em;
      }

      .login-divider::before,
      .login-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #ebebeb;
      }

      .login-footer-note {
        font-size: 0.82rem;
        color: #4d4d4d;
        text-align: center;
        font-family: "Inter", sans-serif;
      }

      .login-footer-note a {
        color: #0055b8;
        font-weight: 700;
      }

      /* ── Right panel — YouTube video ── */
      .login-visual {
        position: relative;
        overflow: hidden;
        background: #0a0c12;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: stretch;
      }

      .login-video-wrap {
        position: relative;
        width: 100%;
        height: 100%;
        min-height: 100vh;
      }

      .login-video-wrap iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
        object-fit: cover;
      }

      /* Dark overlay + caption at bottom */
      .login-video-caption {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 2;
        padding: 2rem 2rem 2.5rem;
        background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
        color: #fff;
        pointer-events: none;
      }

      .login-video-caption strong {
        display: block;
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.3rem;
        letter-spacing: 0.04em;
        color: #ffffff;
        margin-bottom: 0.25rem;
      }

      .login-video-caption span {
        font-family: "Inter", sans-serif;
        font-size: 0.78rem;
        color: rgba(255,255,255,0.65);
      }

      /* ── Responsive ── */
      @media (max-width: 860px) {
        .login-shell {
          grid-template-columns: 1fr;
          grid-template-rows: auto 1fr;
        }

        .login-visual {
          min-height: 280px;
          order: -1;
        }

        .login-video-wrap {
          min-height: 280px;
        }

        .login-panel {
          border-right: none;
          border-top: 1px solid #ebebeb;
          padding: 2rem 1.5rem;
        }
      }
    </style>
  </head>
  <body data-page="login">
    <div id="site-header"></div>

    <div class="login-shell">

      <!-- LEFT: Login form -->
      <div class="login-panel">
        <a class="login-brand" href="/index.html">
          <img src="/assets/images/hoinam-logo.png" alt="Hoinam Energy logo">
          <span class="login-brand-name">Hoinam Energy</span>
        </a>

        <div class="login-heading">
          <h1>Welcome back</h1>
          <p>Sign in to manage your orders and installations</p>
        </div>

        <div id="auth-config-note"></div>

        <form class="login-form" id="login-form" novalidate>
          <label class="field">
            <span>Email</span>
            <input name="email" type="email" placeholder="you@example.com" required autocomplete="email">
          </label>
          <label class="field">
            <span>Password</span>
            <input name="password" type="password" placeholder="••••••••" required autocomplete="current-password">
          </label>
          <button class="button button-full" type="submit">
            <i class="fa-solid fa-arrow-right-to-bracket" aria-hidden="true"></i> Sign in
          </button>
        </form>

        <div class="login-divider">or</div>

        <button class="button button-secondary button-full" data-google-auth type="button">
          <i class="fa-brands fa-google" aria-hidden="true"></i> Continue with Google
        </button>

        <p class="login-footer-note">
          No account yet? <a href="/register.html">Create one here</a>
        </p>
      </div>

      <!-- RIGHT: Video panel -->
      <div class="login-visual">
        <div class="login-video-wrap">
          <!-- Paste your video URL and replace the src below -->
          <iframe
            id="login-video-frame"
            src="https://www.youtube.com/embed/videoseries?list=PLbpi6ZahtOH6Ar_3GPy3workNmrfLQ4ZS&autoplay=1&mute=1&loop=1&controls=0&showinfo=0&rel=0&modestbranding=1&playsinline=1"
            title="Solar and backup power — Hoinam Energy"
            allow="autoplay; encrypted-media; fullscreen"
            allowfullscreen
            loading="lazy"
          ></iframe>
          <div class="login-video-caption">
            <strong>Power. Anywhere.</strong>
            <span>Solar panels &amp; backup systems — available through Hoinam Energy</span>
          </div>
        </div>
      </div>
    </div>

    <div id="site-footer"></div>
    <script src="/assets/js/site-config.js"></script>
    <script type="module" src="/assets/js/pages/login.js"></script>
  </body>
</html>
