<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Hoinam Energy</title>
    <meta name="description" content="Sign in to manage orders, payments, and installation bookings with Hoinam Energy.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://hoinam-energy.vercel.app/login.html">
    <meta property="og:title" content="Login | Hoinam Energy">
    <meta property="og:description" content="Sign in to manage orders, payments, and installation bookings.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hoinam-energy.vercel.app/login.html">
    <meta property="og:image" content="https://hoinam-energy.vercel.app/assets/og-image.svg">
    <meta name="theme-color" content="#0055B8">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <style>
      /* ── Login page layout ── */
      body[data-page="login"] {
        background: #f5f5f5;
      }

      body[data-page="login"] #site-header,
      body[data-page="login"] #site-footer {
        display: none;
      }

      .login-shell {
        display: grid;
        grid-template-columns: minmax(380px, 480px) 1fr;
        min-height: 100vh;
      }

      /* ── Left panel ── */
      .login-panel {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 2rem;
        padding: 3rem 2.5rem;
        background: #ffffff;
        border-right: 1px solid #ebebeb;
        position: relative;
        z-index: 1;
      }

      .login-brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        text-decoration: none;
      }

      .login-brand img {
        width: 42px;
        height: 42px;
        object-fit: contain;
      }

      .login-brand-name {
        font-family: "Playfair Display", serif;
        font-size: 0.92rem;
        letter-spacing: -0.02em;
        color: #333333;
      }

      .login-heading {
        display: grid;
        gap: 0.35rem;
      }

      .login-heading h1 {
        font-family: "Playfair Display", serif;
        font-size: clamp(1.1rem, 2vw, 1.5rem);
        color: #333333;
        margin: 0;
        line-height: 1.1;
        letter-spacing: -0.03em;
      }

      .login-heading p {
        margin: 0;
        font-size: 0.8rem;
        letter-spacing: -0.01em;
        color: #4d4d4d;
        font-family: "Inter", sans-serif;
      }

      .login-form {
        display: grid;
        gap: 1rem;
      }

      .login-form .field {
        display: grid;
        gap: 0.4rem;
      }

      .login-form label span {
        font-family: "Playfair Display", serif;
        font-size: 0.7rem;
        letter-spacing: -0.01em;
        text-transform: uppercase;
        color: #333333;
      }

      .login-form input {
        border: 1.5px solid #ebebeb;
        border-radius: 14px;
        padding: 0.85rem 1rem;
        font-size: 0.92rem;
        background: #f9f9f9;
        transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
      }

      .login-form input:focus {
        outline: none;
        border-color: #0055b8;
        background: #ffffff;
        box-shadow: 0 0 0 4px rgba(0, 85, 184, 0.1);
      }

      .login-divider {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: #aaa;
        font-size: 0.78rem;
        font-family: "Playfair Display", serif;
        letter-spacing: 0.06em;
      }

      .login-divider::before,
      .login-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #ebebeb;
      }

      .login-footer-note {
        font-size: 0.82rem;
        color: #4d4d4d;
        text-align: center;
        font-family: "Inter", sans-serif;
      }

      .login-footer-note a {
        color: #0055b8;
        font-weight: 700;
      }

      /* ── Right panel — 3D solar visual ── */
      .login-visual {
        position: relative;
        overflow: hidden;
        background: #060810;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2.5rem;
      }

      /* star field canvas */
      #login-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      /* ambient glow blobs */
      .lv-glow {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
        filter: blur(80px);
        z-index: 0;
      }
      .lv-glow-1 {
        width: 420px; height: 420px;
        background: rgba(0,85,184,0.22);
        top: -80px; right: -80px;
        animation: glowDrift 9s ease-in-out infinite alternate;
      }
      .lv-glow-2 {
        width: 320px; height: 320px;
        background: rgba(255,193,7,0.12);
        bottom: -60px; left: -60px;
        animation: glowDrift 12s ease-in-out infinite alternate-reverse;
      }
      @keyframes glowDrift {
        from { transform: translate(0,0) scale(1); }
        to   { transform: translate(30px,20px) scale(1.1); }
      }

      /* ── 3D solar panel ── */
      .lv-scene {
        position: relative;
        z-index: 2;
        perspective: 900px;
        width: 260px;
        height: 260px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .lv-panel-wrap {
        width: 220px;
        height: 220px;
        transform-style: preserve-3d;
        animation: panelSpin 14s linear infinite;
        filter: drop-shadow(0 20px 50px rgba(0,85,184,0.6))
                drop-shadow(0 0 30px rgba(255,193,7,0.25));
      }

      @keyframes panelSpin {
        0%   { transform: rotateY(0deg)   rotateX(15deg); }
        50%  { transform: rotateY(180deg) rotateX(-10deg); }
        100% { transform: rotateY(360deg) rotateX(15deg); }
      }

      .lv-panel-wrap img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      /* pulse ring around panel */
      .lv-ring {
        position: absolute;
        border-radius: 50%;
        border: 1px solid rgba(255,193,7,0.15);
        animation: ringPulse 3s ease-in-out infinite;
        pointer-events: none;
      }
      .lv-ring-1 { width: 280px; height: 280px; animation-delay: 0s; }
      .lv-ring-2 { width: 340px; height: 340px; animation-delay: 1s; border-color: rgba(0,85,184,0.12); }
      .lv-ring-3 { width: 400px; height: 400px; animation-delay: 2s; border-color: rgba(255,193,7,0.06); }
      @keyframes ringPulse {
        0%,100% { opacity: 0.4; transform: scale(1); }
        50%      { opacity: 1;   transform: scale(1.04); }
      }

      /* energy particles */
      .lv-particle {
        position: absolute;
        width: 5px; height: 5px;
        border-radius: 50%;
        background: #ffc107;
        z-index: 1;
        opacity: 0;
        animation: particleFloat var(--d,4s) ease-in-out var(--delay,0s) infinite;
      }
      @keyframes particleFloat {
        0%   { opacity:0; transform: translateY(0) scale(0.5); }
        20%  { opacity:0.9; }
        100% { opacity:0; transform: translateY(-160px) scale(1.5); }
      }

      /* ── animated text ── */
      .lv-text {
        position: relative;
        z-index: 2;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
      }

      .lv-headline {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(1.6rem, 3vw, 2.4rem);
        letter-spacing: 0.12em;
        color: #ffffff;
        overflow: hidden;
        white-space: nowrap;
        border-right: 2px solid #ffc107;
        width: 0;
        animation: typewriter 2.8s steps(22, end) 0.5s forwards,
                   blinkCursor 0.75s step-end 3.3s 6;
      }
      @keyframes typewriter {
        from { width: 0; }
        to   { width: 22ch; }
      }
      @keyframes blinkCursor {
        0%,100% { border-color: #ffc107; }
        50%      { border-color: transparent; }
      }

      .lv-sub {
        font-family: "Inter", sans-serif;
        font-size: 0.8rem;
        color: rgba(255,255,255,0.5);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0;
        animation: fadeUp 600ms ease 3.5s forwards;
      }
      @keyframes fadeUp {
        from { opacity:0; transform: translateY(10px); }
        to   { opacity:1; transform: translateY(0); }
      }

      .lv-stats {
        display: flex;
        gap: 2rem;
        opacity: 0;
        animation: fadeUp 600ms ease 4s forwards;
      }
      .lv-stat {
        text-align: center;
      }
      .lv-stat strong {
        display: block;
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.4rem;
        letter-spacing: 0.06em;
        color: #ffc107;
      }
      .lv-stat span {
        font-family: "Inter", sans-serif;
        font-size: 0.68rem;
        color: rgba(255,255,255,0.5);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      /* ── Responsive ── */
      @media (max-width: 860px) {
        .login-shell {
          grid-template-columns: 1fr;
          grid-template-rows: auto 1fr;
        }
        .login-visual {
          min-height: 340px;
          order: -1;
          gap: 1.5rem;
        }
        .lv-scene { width: 180px; height: 180px; }
        .lv-panel-wrap { width: 150px; height: 150px; }
        .lv-ring-1 { width: 200px; height: 200px; }
        .lv-ring-2 { width: 250px; height: 250px; }
        .lv-ring-3 { display: none; }
        .login-panel {
          border-right: none;
          border-top: 1px solid #ebebeb;
          padding: 2rem 1.5rem;
        }
      }
    </style>
  </head>
  <body data-page="login">
    <div id="site-header"></div>

    <div class="login-shell">

      <!-- LEFT: Login form -->
      <div class="login-panel">
        <a class="login-brand" href="/index.html">
          <img src="/assets/images/hoinam-logo.png" alt="Hoinam Energy logo">
          <span class="login-brand-name">Hoinam Energy</span>
        </a>

        <div class="login-heading">
          <h1>Welcome back</h1>
          <p>Sign in to manage your orders and installations</p>
        </div>

        <div id="auth-config-note"></div>

        <form class="login-form" id="login-form" novalidate>
          <label class="field">
            <span>Email</span>
            <input name="email" type="email" placeholder="you@example.com" required autocomplete="email">
          </label>
          <label class="field">
            <span>Password</span>
            <input name="password" type="password" placeholder="••••••••" required autocomplete="current-password">
          </label>
          <button class="button button-full" type="submit">
            <i class="fa-solid fa-arrow-right-to-bracket" aria-hidden="true"></i> Sign in
          </button>
        </form>

        <div class="login-divider">or</div>

        <button class="button button-secondary button-full" data-google-auth type="button">
          <i class="fa-brands fa-google" aria-hidden="true"></i> Continue with Google
        </button>

        <p class="login-footer-note">
          No account yet? <a href="/register.html">Create one here</a>
        </p>
      </div>

      <!-- RIGHT: 3D solar panel visual -->
      <div class="login-visual" aria-hidden="true">
        <canvas id="login-canvas"></canvas>

        <!-- ambient glows -->
        <div class="lv-glow lv-glow-1"></div>
        <div class="lv-glow lv-glow-2"></div>

        <!-- floating particles -->
        <div class="lv-particle" style="--d:3.8s;--delay:0s;   left:28%;bottom:22%"></div>
        <div class="lv-particle" style="--d:5.1s;--delay:1.2s; left:48%;bottom:16%"></div>
        <div class="lv-particle" style="--d:4.3s;--delay:0.7s; left:68%;bottom:26%"></div>
        <div class="lv-particle" style="--d:6.2s;--delay:2.1s; left:38%;bottom:12%"></div>
        <div class="lv-particle" style="--d:3.5s;--delay:1.8s; left:58%;bottom:19%"></div>
        <div class="lv-particle" style="--d:4.8s;--delay:3s;   left:22%;bottom:35%"></div>

        <!-- 3D rotating solar panel -->
        <div class="lv-scene">
          <div class="lv-ring lv-ring-1"></div>
          <div class="lv-ring lv-ring-2"></div>
          <div class="lv-ring lv-ring-3"></div>
          <div class="lv-panel-wrap">
            <img src="/assets/images/products/110w-solar-panel-foldable.png"
                 alt="Solar panel rotating">
          </div>
        </div>

        <!-- animated text -->
        <div class="lv-text">
          <p class="lv-headline">Login to Hoinam Energy</p>
          <p class="lv-sub">Solar &amp; backup power · Aba, Nigeria</p>
          <div class="lv-stats">
            <div class="lv-stat"><strong>8+</strong><span>Products</span></div>
            <div class="lv-stat"><strong>100%</strong><span>End-to-end</span></div>
            <div class="lv-stat"><strong>Aba</strong><span>Based</span></div>
          </div>
        </div>
      </div>

      <script>
        /* star field canvas on login page */
        (function () {
          const c = document.getElementById("login-canvas");
          if (!c) return;
          const ctx = c.getContext("2d");
          let W, H, stars = [];
          function resize() {
            W = c.width  = c.offsetWidth;
            H = c.height = c.offsetHeight;
          }
          resize();
          window.addEventListener("resize", resize, { passive: true });
          for (let i = 0; i < 90; i++) {
            stars.push({
              x: Math.random(), y: Math.random(),
              r: Math.random() * 1.4 + 0.3,
              o: Math.random() * 0.6 + 0.1,
              s: Math.random() * 0.0003 + 0.0001
            });
          }
          function draw() {
            ctx.clearRect(0, 0, W, H);
            stars.forEach(s => {
              s.y -= s.s;
              if (s.y < 0) { s.y = 1; s.x = Math.random(); }
              ctx.beginPath();
              ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
              ctx.fillStyle = `rgba(255,255,255,${s.o})`;
              ctx.fill();
            });
            requestAnimationFrame(draw);
          }
          draw();
        })();
      </script>
    </div>

    <div id="site-footer"></div>
    <script src="/assets/js/site-config.js"></script>
    <script type="module" src="/assets/js/pages/login.js"></script>
  </body>
</html>
