<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Hoinam Energy</title>
    <meta name="description"
        content="Browse and shop premium solar energy products from EcoFlow, Deye, Buttu, and more.">
    <link rel="canonical" href="https://hoinam-energy.vercel.app/shop.html">
    <meta property="og:title" content="Shop | Hoinam Energy">
    <meta property="og:description" content="Premium solar energy products and solutions.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hoinam-energy.vercel.app/shop.html">
    <meta name="theme-color" content="#0055B8">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Shop page specific styles */
        .shop-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
            min-height: calc(100vh - 200px);
        }

        @media (max-width: 768px) {
            .shop-container {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }

        .shop-sidebar {
            background: #fff;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        @media (max-width: 768px) {
            .shop-sidebar {
                position: static;
                margin-bottom: 1rem;
            }
        }

        .shop-sidebar h3 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: #333;
        }

        .store-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .store-item {
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .store-item:hover {
            background: #f5f5f5;
            color: #0055B8;
        }

        .store-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .store-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            background: rgba(0, 0, 0, 0.1);
            flex-shrink: 0;
        }

        .store-item.active .store-icon {
            background: rgba(255, 255, 255, 0.3);
        }

        .shop-content {
            display: grid;
            gap: 2rem;
        }

        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            background: #fff;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        .shop-title {
            font-size: 1.5rem;
            color: #333;
            margin: 0;
        }

        .shop-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .search-box {
            position: relative;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .sort-select {
            padding: 0.75rem 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
            background: white;
            cursor: pointer;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        @media (max-width: 1200px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 1rem;
            }
        }

        .product-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            border-color: #667eea;
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .product-card:hover .product-image img {
            transform: scale(1.05);
        }

        .product-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .product-info {
            padding: 1rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-brand {
            font-size: 0.75rem;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        .product-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
            line-height: 1.3;
            min-height: 2.6rem;
        }

        .product-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: #0055B8;
            margin-bottom: 0.5rem;
        }

        .product-stock {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 1rem;
            flex-grow: 1;
        }

        .product-stock.low {
            color: #E85D04;
        }

        .product-stock.out {
            color: #DC2F02;
        }

        .add-to-cart-btn {
            padding: 0.75rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .add-to-cart-btn:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .add-to-cart-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem 1rem;
            color: #999;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .loading-spinner {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            padding: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="site-header"></div>

    <main>
        <section class="page-hero">
            <div class="container">
                <span class="eyebrow">Shop</span>
                <h1>Premium Solar Energy Products</h1>
                <p>Explore our curated collection of premium solar energy solutions from trusted worldwide brands.</p>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <div class="shop-container">
                    <!-- Sidebar with stores -->
                    <aside class="shop-sidebar">
                        <h3><i class="fas fa-store" aria-hidden="true"></i> Stores</h3>
                        <div class="store-list" id="store-list"></div>
                    </aside>

                    <!-- Main shop content -->
                    <div class="shop-content">
                        <!-- Header with search and sort -->
                        <div class="shop-header">
                            <h2 class="shop-title" id="shop-title">All Products</h2>
                            <div class="shop-controls">
                                <div class="search-box">
                                    <i class="fas fa-search"></i>
                                    <input type="text" id="search-input" placeholder="Search products...">
                                </div>
                                <select id="sort-select" class="sort-select">
                                    <option value="featured">Featured</option>
                                    <option value="name-asc">Name (A-Z)</option>
                                    <option value="name-desc">Name (Z-A)</option>
                                    <option value="price-asc">Price (Low to High)</option>
                                    <option value="price-desc">Price (High to Low)</option>
                                </select>
                            </div>
                        </div>

                        <!-- Products grid -->
                        <div class="products-grid" id="products-grid">
                            <div class="loading-spinner">
                                <div class="spinner"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="site-footer"></div>

    <script src="/assets/js/site-config.js"></script>
    <script type="module" src="/assets/js/pages/shop.js"></script>
</body>

</html>
