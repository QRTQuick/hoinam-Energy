<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            background: rgba(255, 255, 255, 0.95);
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .auth-loading-logo {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .auth-loading-text {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .auth-loading-text h2 {
            font-size: 1.5rem;
            color: #333;
            margin: 0;
        }

        .auth-loading-text p {
            font-size: 0.95rem;
            color: #666;
            margin: 0;
        }

        .auth-loading-progress {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }

        .auth-loading-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            animation: progress 2s ease-in-out infinite;
        }

        @keyframes progress {
            0% {
                width: 0%;
            }

            50% {
                width: 100%;
            }

            100% {
                width: 0%;
            }
        }

        .auth-loading-dots {
            display: inline-flex;
            gap: 0.25rem;
        }

        .auth-loading-dots-centered {
            justify-content: center;
            margin-top: 0.5rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: blink 1.4s ease-in-out infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {

            0%,
            60%,
            100% {
                opacity: 0.3;
            }

            30% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="auth-loading-container" id="auth-loading-container">
        <div class="auth-loading-logo">
            <div class="spinner"></div>
        </div>
        <div class="auth-loading-text">
            <h2>Signing you in</h2>
            <p>Please wait while we authenticate your account</p>
            <div class="auth-loading-dots auth-loading-dots-centered">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
        <div class="auth-loading-progress">
            <div class="auth-loading-progress-bar"></div>
        </div>
    </div>

    <script>
        // Timeout to redirect to home if auth takes too long
        setTimeout(() => {
            if (document.getElementById('auth-loading-container')) {
                window.location.href = '/';
            }
        }, 15000);
    </script>
</body>

</html>
