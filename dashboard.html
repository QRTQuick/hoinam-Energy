<body>
  <script>
    (function () {
      try {
        var raw = window.sessionStorage.getItem("hoinam_auth_loading_state");
        if (!raw) {
          return;
        }

        var state = JSON.parse(raw);
        if (!state || !state.active) {
          return;
        }

        if (Date.now() - Number(state.startedAt || 0) > 90000) {
          window.sessionStorage.removeItem("hoinam_auth_loading_state");
          return;
        }

        var escapeHtml = function (value) {
          return String(value || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        };

        var steps = Array.isArray(state.steps) && state.steps.length
          ? state.steps
          : ["Google verified", "Syncing account", "Opening dashboard"];

        document.body.dataset.authLoading = "true";
        document.body.insertAdjacentHTML(
          "afterbegin",
          '<div id="auth-loading-screen" class="auth-loading-screen">' +
          '<div class="auth-loading-card">' +
          '<div class="auth-loading-mark">' +
          '<img src="/assets/images/hoinam-logo.png" alt="Hoinam Energy">' +
          "</div>" +
          '<div class="auth-loading-spinner" aria-hidden="true"></div>' +
          "<h2>" + escapeHtml(state.title || "Opening your dashboard") + "</h2>" +
          "<p>" + escapeHtml(state.copy || "Your dashboard is being prepared.") + "</p>" +
          '<div class="auth-loading-steps">' +
          steps.map(function (step) {
            return "<span>" + escapeHtml(step) + "</span>";
          }).join("") +
          "</div>" +
          "</div>" +
          "</div>"
        );
      } catch (_error) {
        // Ignore restore issues and allow the page to continue loading normally.
      }
    })();
  </script>
  <div id="site-header"></div>
  <main>
    <section class="page-hero">
      <div class="container">
        <span class="eyebrow">Customer dashboard</span>
        <h1 id="profile-name">Your Hoinam account</h1>
        <p id="profile-email">Track orders, installation requests, and your account activity.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div id="profile-completion-slot"></div>
        <div class="dashboard-grid" id="dashboard-stats"></div>
      </div>
    </section>

    <section class="section">
      <div class="container split-layout">
        <div>
          <div class="section-heading">
            <div>
              <span class="eyebrow">Orders</span>
              <h2>Recent orders</h2>
            </div>
          </div>
          <div class="dashboard-grid" id="orders-list"></div>
        </div>
        <div>
          <div class="section-heading">
            <div>
              <span class="eyebrow">Installations</span>
              <h2>Booking requests</h2>
            </div>
          </div>
          <div class="dashboard-grid" id="installations-list"></div>
        </div>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="/assets/js/site-config.js"></script>
  <script type="module" src="/assets/js/pages/dashboard.js"></script>
</body>
