<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Hoinam Energy</title>
    <meta name="description" content="Track orders and installation bookings in your Hoinam Energy dashboard.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://hoinam-energy.vercel.app/dashboard.html">
    <meta property="og:title" content="Dashboard | Hoinam Energy">
    <meta property="og:description" content="Track orders and installation bookings in your customer dashboard.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hoinam-energy.vercel.app/dashboard.html">
    <meta property="og:image" content="https://hoinam-energy.vercel.app/assets/og-image.svg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Dashboard | Hoinam Energy">
    <meta name="twitter:description" content="Track orders and installation bookings in your customer dashboard.">
    <meta name="twitter:image" content="https://hoinam-energy.vercel.app/assets/og-image.svg">
    <meta name="theme-color" content="#0055B8">
    <link rel="stylesheet" href="/assets/css/styles.css">
  </head>
  <body>
    <div id="site-header"></div>
    <main>
      <section class="page-hero">
        <div class="container">
          <span class="eyebrow">Customer dashboard</span>
          <h1 id="profile-name">Your Hoinam account</h1>
          <p id="profile-email">Track orders, installation requests, and your account activity.</p>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <div id="profile-completion-slot"></div>
          <div class="dashboard-grid" id="dashboard-stats"></div>
        </div>
      </section>

      <section class="section">
        <div class="container split-layout">
          <div>
            <div class="section-heading">
              <div>
                <span class="eyebrow">Orders</span>
                <h2>Recent orders</h2>
              </div>
            </div>
            <div class="dashboard-grid" id="orders-list"></div>
          </div>
          <div>
            <div class="section-heading">
              <div>
                <span class="eyebrow">Installations</span>
                <h2>Booking requests</h2>
              </div>
            </div>
            <div class="dashboard-grid" id="installations-list"></div>
          </div>
        </div>
      </section>
    </main>
    <div id="site-footer"></div>
    <script src="/assets/js/site-config.js"></script>
    <script type="module" src="/assets/js/pages/dashboard.js"></script>
